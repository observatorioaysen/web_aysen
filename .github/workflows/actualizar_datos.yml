name: Actualizar datos parlamentarios

on:
  schedule:
    # Ejecutar cada 6 horas (0:00, 6:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  actualizar:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Necesario para hacer push del JSON

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar script de datos
        run: python obtener_datos_congreso.py

      - name: Publicar JSON actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos_parlamentarios_aysen.json
          git diff --cached --quiet || git commit -m "Actualizar datos parlamentarios [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
